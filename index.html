<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>完全ずる防止タイマー</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }

        .container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 90%;
            width: 300px;
        }

        #timer {
            font-size: 2.5rem;
            margin: 20px 0;
            font-weight: bold;
            color: #333;
        }

        #character {
            width: 150px;
            height: 150px;
            object-fit: contain;
            margin-bottom: 20px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            font-size: 1rem;
            padding: 10px 20px;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #startBtn { background-color: #4CAF50; }
        #startBtn:active { background-color: #45a049; }

        #resetBtn { background-color: #f44336; }
        #resetBtn:active { background-color: #da190b; }
    </style>
</head>
<body>

<div class="container">
    <img id="character" src="https://picsum.photos/id/237/150/150" alt="キャラクター">
    <div id="timer">00:00</div>
    <div class="button-group">
        <button id="startBtn">スタート</button>
        <button id="resetBtn">リセット</button>
    </div>
</div>

<script>
    let totalSeconds = 0;      // これまでに保存された合計秒数
    let currentSessionSeconds = 0; // スタートしてから現在のセッションで経過した秒数
    let timerInterval = null;
    let isRunning = false;
    let startTime = null;      // スタートボタンを押した時刻

    const CHANGE_TIME_SECONDS = 10; // 10秒で変化（テスト用）
    const STORAGE_KEY = 'study_timer_perfect_seconds';

    const IMAGE_START = "https://picsum.photos/id/237/150/150";
    const IMAGE_CHANGED = "https://picsum.photos/id/1025/150/150";

    const timerElement = document.getElementById('timer');
    const characterElement = document.getElementById('character');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');

    // 起動時にデータを読み込む
    window.addEventListener('load', () => {
        const savedSeconds = localStorage.getItem(STORAGE_KEY);
        if (savedSeconds !== null) {
            totalSeconds = parseInt(savedSeconds, 10);
            displayTime(totalSeconds);
            checkCharacter(totalSeconds);
        }
    });

    // 画面の表示・非表示（アプリを閉じた時）を監視する機能
    document.addEventListener('visibilitychange', () => {
        // 画面が非表示（ホーム画面に戻った、別タブに移ったなど）になった場合
        if (document.hidden) {
            if (isRunning) {
                // 動いていたら、その瞬間に強制ストップさせて時間を保存する
                stopTimer();
            }
        }
    });

    // スタート・ストップボタンの処理
    startBtn.addEventListener('click', () => {
        if (isRunning) {
            stopTimer();
        } else {
            startTimer();
        }
    });

    // タイマーを開始する関数
    function startTimer() {
        startTime = Date.now();
        timerInterval = setInterval(updateTimer, 200);
        startBtn.textContent = 'ストップ';
        isRunning = true;
    }

    // タイマーを停止して保存する関数
    function stopTimer() {
        clearInterval(timerInterval);
        totalSeconds += currentSessionSeconds;
        currentSessionSeconds = 0;
        localStorage.setItem(STORAGE_KEY, totalSeconds); // データを保存
        
        startBtn.textContent = 'スタート';
        isRunning = false;
        
        displayTime(totalSeconds);
        checkCharacter(totalSeconds);
    }

    // リセットボタン
    resetBtn.addEventListener('click', () => {
        if (confirm('勉強時間をリセットして0秒に戻しますか？')) {
            clearInterval(timerInterval);
            isRunning = false;
            startBtn.textContent = 'スタート';
            totalSeconds = 0;
            currentSessionSeconds = 0;
            localStorage.removeItem(STORAGE_KEY);
            displayTime(0);
            characterElement.src = IMAGE_START;
        }
    });

    // タイマーの更新
    function updateTimer() {
        if (!isRunning) return;
        const elapsedTimeMs = Date.now() - startTime;
        currentSessionSeconds = Math.floor(elapsedTimeMs / 1000);

        const displayTotal = totalSeconds + currentSessionSeconds;
        displayTime(displayTotal);
        checkCharacter(displayTotal);
    }

    // 時間表示の整形
    function displayTime(secondsInput) {
        let minutes = Math.floor(secondsInput / 60);
        let seconds = secondsInput % 60;
        timerElement.textContent = 
            String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');
    }

    // 画像切り替え
    function checkCharacter(secondsInput) {
        if (secondsInput >= CHANGE_TIME_SECONDS) {
            characterElement.src = IMAGE_CHANGED;
        } else {
            characterElement.src = IMAGE_START;
        }
    }
</script>

</body>
</html>
