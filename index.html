<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>勉強タイマー（保存機能付き）</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }

        .container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 90%;
            width: 300px;
        }

        #timer {
            font-size: 2.5rem;
            margin: 20px 0;
            font-weight: bold;
            color: #333;
        }

        #character {
            width: 150px;
            height: 150px;
            object-fit: contain;
            margin-bottom: 20px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            font-size: 1rem;
            padding: 10px 20px;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #startBtn { background-color: #4CAF50; }
        #startBtn:active { background-color: #45a049; }

        #resetBtn { background-color: #f44336; }
        #resetBtn:active { background-color: #da190b; }
    </style>
</head>
<body>

<div class="container">
    <img id="character" src="https://picsum.photos/id/237/150/150" alt="キャラクター">
    <div id="timer">00:00</div>
    <div class="button-group">
        <button id="startBtn">スタート</button>
        <button id="resetBtn">リセット</button>
    </div>
</div>

<script>
    let totalSeconds = 0;
    let timerInterval = null;
    let isRunning = false;

    // 設定パラメータ
    const CHANGE_TIME_SECONDS = 10; // 10秒で変化（テスト用）
    const STORAGE_KEY = 'study_timer_seconds'; // ブラウザに保存する際のデータの名前

    const IMAGE_START = "https://picsum.photos/id/237/150/150";
    const IMAGE_CHANGED = "https://picsum.photos/id/1025/150/150";

    const timerElement = document.getElementById('timer');
    const characterElement = document.getElementById('character');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');

    // --- 画面が開かれた時の処理（データの読み込み） ---
    window.addEventListener('load', () => {
        const savedSeconds = localStorage.getItem(STORAGE_KEY);
        if (savedSeconds !== null) {
            totalSeconds = parseInt(savedSeconds, 10); // 保存された文字列を数値に変換
            displayTime(totalSeconds);
            checkCharacter(totalSeconds);
        }
    });

    // スタート/ストップボタンの操作
    startBtn.addEventListener('click', () => {
        if (isRunning) {
            clearInterval(timerInterval);
            startBtn.textContent = 'スタート';
            isRunning = false;
        } else {
            timerInterval = setInterval(updateTimer, 1000);
            startBtn.textContent = 'ストップ';
            isRunning = true;
        }
    });

    // リセットボタンの操作（データを削除して0に戻す）
    resetBtn.addEventListener('click', () => {
        if (confirm('勉強時間をリセットして0秒に戻しますか？')) {
            clearInterval(timerInterval);
            isRunning = false;
            startBtn.textContent = 'スタート';
            totalSeconds = 0;
            localStorage.removeItem(STORAGE_KEY); // 保存データを削除
            displayTime(totalSeconds);
            characterElement.src = IMAGE_START;
        }
    });

    function updateTimer() {
        totalSeconds++;
        
        // 1秒進むごとにブラウザへ保存
        localStorage.setItem(STORAGE_KEY, totalSeconds);
        
        displayTime(totalSeconds);
        checkCharacter(totalSeconds);
    }

    // 時間を表示用に整形する関数
    function displayTime(secondsInput) {
        let minutes = Math.floor(secondsInput / 60);
        let seconds = secondsInput % 60;
        timerElement.textContent = 
            String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');
    }

    // 時間に応じて画像をチェック・変更する関数
    function checkCharacter(secondsInput) {
        if (secondsInput >= CHANGE_TIME_SECONDS) {
            characterElement.src = IMAGE_CHANGED;
        } else {
            characterElement.src = IMAGE_START;
        }
    }
</script>

</body>
</html>
