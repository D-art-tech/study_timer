<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ガチ勉強タイマー（ずる防止版）</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }

        .container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 90%;
            width: 300px;
        }

        #timer {
            font-size: 2.5rem;
            margin: 20px 0;
            font-weight: bold;
            color: #333;
        }

        #character {
            width: 150px;
            height: 150px;
            object-fit: contain;
            margin-bottom: 20px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            font-size: 1rem;
            padding: 10px 20px;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #startBtn { background-color: #4CAF50; }
        #startBtn:active { background-color: #45a049; }

        #resetBtn { background-color: #f44336; }
        #resetBtn:active { background-color: #da190b; }
    </style>
</head>
<body>

<div class="container">
    <img id="character" src="https://picsum.photos/id/237/150/150" alt="キャラクター">
    <div id="timer">00:00</div>
    <div class="button-group">
        <button id="startBtn">スタート</button>
        <button id="resetBtn">リセット</button>
    </div>
</div>

<script>
    let totalSeconds = 0;      // これまでに積み上げた合計勉強秒数
    let currentSessionSeconds = 0; // 今回のスタートから現在までに経過した秒数
    let timerInterval = null;
    let isRunning = false;
    let startTime = null;      // スタートボタンを押した「本当の時刻」

    // 設定パラメータ
    const CHANGE_TIME_SECONDS = 10; // 10秒で変化（テスト用）
    const STORAGE_KEY = 'study_timer_total_seconds';

    const IMAGE_START = "https://picsum.photos/id/237/150/150";
    const IMAGE_CHANGED = "https://picsum.photos/id/1025/150/150";

    const timerElement = document.getElementById('timer');
    const characterElement = document.getElementById('character');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');

    // 画面が開かれた時に、過去の合計時間を読み込む
    window.addEventListener('load', () => {
        const savedSeconds = localStorage.getItem(STORAGE_KEY);
        if (savedSeconds !== null) {
            totalSeconds = parseInt(savedSeconds, 10);
            displayTime(totalSeconds);
            checkCharacter(totalSeconds);
        }
    });

    // スタート/ストップボタン
    startBtn.addEventListener('click', () => {
        if (isRunning) {
            // ストップした時：今回のセッション時間をこれまでの合計に足して保存
            clearInterval(timerInterval);
            totalSeconds += currentSessionSeconds;
            currentSessionSeconds = 0;
            localStorage.setItem(STORAGE_KEY, totalSeconds); // ここで初めて保存

            startBtn.textContent = 'スタート';
            isRunning = false;
        } else {
            // スタートした時：今の「本当の時刻」を記録
            startTime = Date.now(); 
            timerInterval = setInterval(updateTimer, 200); // ズレを防ぐため細かくチェック
            startBtn.textContent = 'ストップ';
            isRunning = true;
        }
    });

    // リセットボタン
    resetBtn.addEventListener('click', () => {
        if (confirm('勉強時間をリセットして0秒に戻しますか？')) {
            clearInterval(timerInterval);
            isRunning = false;
            startBtn.textContent = 'スタート';
            totalSeconds = 0;
            currentSessionSeconds = 0;
            localStorage.removeItem(STORAGE_KEY);
            displayTime(0);
            characterElement.src = IMAGE_START;
        }
    });

    // タイマーの更新処理（実際の時間経過を計算）
    function updateTimer() {
        if (!isRunning) return;

        // 「今の時刻」と「スタートした時刻」の差（ミリ秒）を計算して秒に直す
        const elapsedTimeMs = Date.now() - startTime;
        currentSessionSeconds = Math.floor(elapsedTimeMs / 1000);

        // 表示する時間は【過去の合計 ＋ 今回の経過時間】
        const displayTotal = totalSeconds + currentSessionSeconds;
        
        displayTime(displayTotal);
        checkCharacter(displayTotal);
    }

    // 時間を表示用に整形
    function displayTime(secondsInput) {
        let minutes = Math.floor(secondsInput / 60);
        let seconds = secondsInput % 60;
        timerElement.textContent = 
            String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');
    }

    // 画像変更
    function checkCharacter(secondsInput) {
        if (secondsInput >= CHANGE_TIME_SECONDS) {
            characterElement.src = IMAGE_CHANGED;
        } else {
            characterElement.src = IMAGE_START;
        }
    }
</script>

</body>
</html>
