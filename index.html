<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>勉強タイマー</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }

        .container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 90%;
            width: 300px;
        }

        /* 画像を表示する「窓」の設定 */
        .character-window {
            width: 150px;       /* 画面に表示する横幅 */
            height: 150px;      /* 画面に表示する縦幅 */
            overflow: hidden;   /* 窓からはみ出た部分（2枚目のポーズ）を隠す */
            margin: 0 auto 20px auto;
            mix-blend-mode: multiply; /* 画像の背景の白を自動で透明化する */
        }

        #character {
            width: 300px;       /* 2枚並んだ画像全体の横幅（150px × 2コマ分） */
            height: 150px;
            object-fit: fill;
            display: block;
            transform: translateX(0px); /* 左右にスライドさせるための初期位置 */
        }

        #timer {
            font-size: 2.5rem;
            margin: 20px 0;
            font-weight: bold;
            color: #333;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            font-size: 1rem;
            padding: 10px 20px;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #startBtn { background-color: #4CAF50; }
        #startBtn:active { background-color: #45a049; }

        #resetBtn { background-color: #f44336; }
        #resetBtn:active { background-color: #da190b; }
    </style>
</head>
<body>

<div class="container">
    <div class="character-window">
        <img id="character" src="img/cat_spritesheet.png" alt="キャラクター">
    </div>
    
    <div id="timer">00:00</div>
    <div class="button-group">
        <button id="startBtn">スタート</button>
        <button id="resetBtn">リセット</button>
    </div>
</div>

<script>
    let totalSeconds = 0;          // 過去の合計勉強秒数
    let currentSessionSeconds = 0; // 今回のセッションの経過秒数
    let timerInterval = null;
    let isRunning = false;
    let startTime = null;

    let animationInterval = null;  // アニメーション用のタイマー
    let currentFrame = 1;          // 1: 左のポーズ、2: 右のポーズ

    // --- 【設定パラメータ】 ---
    const CHANGE_TIME_SECONDS = 10; // 目標時間（テスト用に10秒）
    const STORAGE_KEY = 'study_timer_animated_mouse_and_cat_seconds';
    
    // 画像のパス（両方とも img フォルダに入っている前提です）
    const MOUSE_IMAGE = "img/mouse_spritesheet.png";
    const CAT_IMAGE = "img/cat_spritesheet.png";

    // 【重要】それぞれの動物の「シフト量（ずらすピクセル数）」
    // 画像によって猫が窓の真ん中からずれる場合は、ここを微調整してください！
    const MOUSE_SHIFT = "-140px"; 
    const CAT_SHIFT = "-135px";  
    // --------------------------

    const characterElement = document.getElementById('character');
    const timerElement = document.getElementById('timer');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');

    // 起動時にデータを読み込む
    window.addEventListener('load', () => {
        const savedSeconds = localStorage.getItem(STORAGE_KEY);
        if (savedSeconds !== null) {
            totalSeconds = parseInt(savedSeconds, 10);
            displayTime(totalSeconds);
        }
        initCharacter(); // 初期表示の判定
    });

    // 画面が非表示になったらずる防止でストップ
    document.addEventListener('visibilitychange', () => {
        if (document.hidden && isRunning) {
            stopTimer();
        }
    });

    // スタート・ストップ
    startBtn.addEventListener('click', () => {
        if (isRunning) {
            stopTimer();
        } else {
            startTimer();
        }
    });

    function startTimer() {
        startTime = Date.now();
        timerInterval = setInterval(updateTimer, 200);
        
        // 【修正】キャラクターがアニメーション中か目標達成後かで、適切なアニメーションを即座に開始
        animateCharacter(); // 初回実行して遅延をなくす
        animationInterval = setInterval(animateCharacter, 500); // 0.5秒ごとにコマ切り替え
        
        startBtn.textContent = 'ストップ';
        isRunning = true;
    }

    function stopTimer() {
        clearInterval(timerInterval);
        clearInterval(animationInterval);
        
        totalSeconds += currentSessionSeconds;
        currentSessionSeconds = 0;
        localStorage.setItem(STORAGE_KEY, totalSeconds);
        
        startBtn.textContent = 'スタート';
        isRunning = false;
        
        displayTime(totalSeconds);
        initCharacter(); // タイマーが止まったら現在のキャラクターの初期ポーズ（左側）に固定
    }

    // リセット
    resetBtn.addEventListener('click', () => {
        if (confirm('勉強時間をリセットして0秒に戻しますか？')) {
            clearInterval(timerInterval);
            clearInterval(animationInterval);
            isRunning = false;
            startBtn.textContent = 'スタート';
            totalSeconds = 0;
            currentSessionSeconds = 0;
            localStorage.removeItem(STORAGE_KEY);
            displayTime(0);
            initCharacter();
        }
    });

    // アニメーションを制御する関数
    function animateCharacter() {
        currentFrame = (currentFrame === 1) ? 2 : 1;
        let currentShift = "0px";

        // 目標時間（10秒）未満のときは「ねずみ」
        if ( (totalSeconds + currentSessionSeconds) < CHANGE_TIME_SECONDS ) {
            characterElement.src = MOUSE_IMAGE;
            characterElement.style.width = "300px"; 
            currentShift = MOUSE_SHIFT; // ねずみのシフト量
        } 
        // 10秒を超えたら「ねこ」
        else {
            characterElement.src = CAT_IMAGE;
            characterElement.style.width = "300px"; 
            currentShift = CAT_SHIFT; // ねこのシフト量
        }

        // コマを切り替えて動かす
        if (currentFrame === 1) {
            characterElement.style.transform = "translateX(0px)"; // 左（ポーズ1）
        } else {
            characterElement.style.transform = `translateX(${currentShift})`; // 右（ポーズ2）へシフト
        }
    }

    // キャラクターの初期状態を設定する関数（タイマー停止時・起動時）
    function initCharacter() {
        if (totalSeconds < CHANGE_TIME_SECONDS) {
            // 目標未満：ねずみの初期ポーズ（左側）
            characterElement.src = MOUSE_IMAGE;
            characterElement.style.width = "300px"; 
            characterElement.style.transform = "translateX(0px)";
        } else {
            // 目標達成後：ねこの初期ポーズ（左側）
            characterElement.src = CAT_IMAGE;
            characterElement.style.width = "300px"; 
            characterElement.style.transform = "translateX(0px)";
        }
    }

    // タイマーのカウント
    function updateTimer() {
        if (!isRunning) return;
        const elapsedTimeMs = Date.now() - startTime;
        currentSessionSeconds = Math.floor(elapsedTimeMs / 1000);
        displayTime(totalSeconds + currentSessionSeconds);
    }

    // 時間表示の整形
    function displayTime(secondsInput) {
        let minutes = Math.floor(secondsInput / 60);
        let seconds = secondsInput % 60;
        timerElement.textContent = 
            String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');
    }
</script>

</body>
</html>
